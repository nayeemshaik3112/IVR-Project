server:
  port: 8082

spring:
  application:
    name: customer-service
  datasource:
    url: jdbc:mysql://localhost:3307/customerdb
    username: root
    password: root
  jpa:
    hibernate:
      ddl-auto: update
    defer-datasource-initialization: true
    show-sql: false
    properties:
      hibernate:
        format_sql: true
  sql:
    init:
      mode: always
