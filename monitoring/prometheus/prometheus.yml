global:
  scrape_interval: 15s

scrape_configs:
  - job_name: discovery-server
    metrics_path: /actuator/prometheus
    static_configs:
      - targets: ["host.docker.internal:8761"]

  - job_name: config-server
    metrics_path: /actuator/prometheus
    static_configs:
      - targets: ["host.docker.internal:8888"]

  - job_name: api-gateway
    metrics_path: /actuator/prometheus
    static_configs:
      - targets: ["host.docker.internal:8080"]

  - job_name: ivr-orchestrator-service
    metrics_path: /actuator/prometheus
    static_configs:
      - targets: ["host.docker.internal:8081"]

  - job_name: customer-service
    metrics_path: /actuator/prometheus
    static_configs:
      - targets: ["host.docker.internal:8082"]

  - job_name: policy-service
    metrics_path: /actuator/prometheus
    static_configs:
      - targets: ["host.docker.internal:8083"]

  - job_name: claims-service
    metrics_path: /actuator/prometheus
    static_configs:
      - targets: ["host.docker.internal:8084"]

  - job_name: notification-service
    metrics_path: /actuator/prometheus
    static_configs:
      - targets: ["host.docker.internal:8085"]

  - job_name: eligibility-service
    metrics_path: /actuator/prometheus
    static_configs:
      - targets: ["host.docker.internal:8086"]

  - job_name: communication-preference-service
    metrics_path: /actuator/prometheus
    static_configs:
      - targets: ["host.docker.internal:8087"]

  - job_name: ivr-session-service
    metrics_path: /actuator/prometheus
    static_configs:
      - targets: ["host.docker.internal:8089"]